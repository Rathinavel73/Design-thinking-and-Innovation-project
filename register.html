<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Hostel Feedback System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="hero-bg py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus display-4 text-success"></i>
                        <h2 class="fw-bold mt-2">Create Account</h2>
                        <p class="text-muted">Join the hostel feedback system</p>
                    </div>

                    <form id="registerForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" required placeholder="John Doe">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Register Number</label>
                                <input type="text" class="form-control" id="regNo" required placeholder="211xxxx">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">College Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" required placeholder="student@rajalakshmi.edu.in">
                            </div>
                            <div class="form-text text-secondary">Only @rajalakshmi.edu.in is permitted.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Hostel Block / Room</label>
                            <input type="text" class="form-control" id="room" required placeholder="Block A - 204">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Register</button>
                        
                        <div class="text-center">
                            <span class="text-muted">Already have an account?</span>
                            <a href="login.html" class="text-success text-decoration-none fw-bold">Login Here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            if(!isValidEmailDomain(email)) {
                showToast('Registration failed: Only @rajalakshmi.edu.in domain is allowed!', 'danger');
                return;
            }

            // SIMULATE SUCCESSFUL REGISTRATION
            showToast('Registration successful! Please login.', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>
</body>
</html>
